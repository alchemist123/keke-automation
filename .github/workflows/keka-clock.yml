# .github/workflows/keka-clock.yml
# Automated Keka clock-in/clock-out via GitHub Actions cron.
# GitHub cron is in UTC. IST = UTC+5:30.
# Avoid minute 0 and 30 — GitHub cron load peaks at those times.
#   08:17 IST -> 02:47 UTC   (clock-in)
#   20:47 IST -> 15:17 UTC   (clock-out)
name: Keka clock

on:
  schedule:
    - cron: '47 2 * * 1-5'   # ~08:17 IST, Mon-Fri (clock-in)
    - cron: '17 15 * * 1-5'  # ~20:47 IST, Mon-Fri (clock-out)
  workflow_dispatch: {}

jobs:
  clock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Decide in vs out by IST hour
        id: which
        run: |
          HOUR=$(TZ=Asia/Kolkata date +%H)
          if [ "$HOUR" -lt 12 ]; then
            echo "action=in" >> "$GITHUB_OUTPUT"
          else
            echo "action=out" >> "$GITHUB_OUTPUT"
          fi

      - run: npx ts-node keka-clock.ts ${{ steps.which.outputs.action }}
        env:
          KEKA_URL: ${{ secrets.KEKA_URL }}
          KEKA_SESSION: ${{ secrets.KEKA_SESSION }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keka-screenshots-${{ github.run_id }}
          path: '*.png'
          if-no-files-found: ignore
